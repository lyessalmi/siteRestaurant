<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/style.css">
    <title>Contact - Restaurant Fiasco</title>
</head>
<body>
    <header>
        <h1>Contactez le Restaurant Fiasco</h1>
        <nav>
            <a href="index.html">Accueil</a>
            <a href="menu.html">Menu</a>
            <a href="apropos.html">À propos</a>
            <a href="contact.html">Contact</a>
        </nav>
    </header>

    <section id="contact">
        <h2>Nos Coordonnées</h2>
        <p>Adresse : 10 Rue Exemple, 75000 Paris</p>
        <p>Téléphone : 01 23 45 67 89</p>
        <p>Email : contact@fiasco.fr</p>

        <h2>Formulaire de Contact</h2>
        <form id="contactForm">

            <label for="nom">Nom :</label>
            <input type="text" id="nom" name="nom" required> <br>

            <label for="email">Email :</label> 
            <input type="email" id="email" name="email" required> <br>

            <label for="telephone">Téléphone :</label> 
            <input type="tel" id="telephone" name="telephone" pattern="[0-9]{10}" placeholder="0612345678" required><br>

            <label for="message">Message :</label> <br>
            <textarea id="message" name="message" rows="5" minlength="10" required></textarea><br>

            <button type="submit">Envoyer</button><br>
            <button type="reset">Effacer</button>

            <p id="erreur"></p>

        </form>
    </section>

    <footer>
        <p>© 2026 Restaurant Fiasco</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
